<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard DISC Vegas</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<header>
  <img src="assets/vegaslogo1.jpg" class="logo">
  <h1>Dashboard DISC - Vegas Vigilância</h1>
</header>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar funcionário...">
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">
  <button onclick="filtrar()">Filtrar</button>
  <button onclick="exportarPDF()">Exportar PDF</button>
</section>

<section class="cards">
  <div class="card"><h3>Total</h3><p id="total"></p></div>
  <div class="card"><h3>Perfil Dominante</h3><p id="topPerfil"></p></div>
  <div class="card"><h3>Média D</h3><p id="mediaD"></p></div>
  <div class="card"><h3>Média I</h3><p id="mediaI"></p></div>
</section>

<section class="charts">
  <div class="chart-box"><canvas id="perfilChart"></canvas></div>
  <div class="chart-box"><canvas id="mediaChart"></canvas></div>
  <div class="chart-box"><canvas id="comparacaoChart"></canvas></div>
</section>

<section class="ranking">
  <h2>Ranking de Perfis</h2>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Perfil</th>
        <th>D</th>
        <th>I</th>
        <th>S</th>
        <th>C</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</section>

<script src="script.js"></script>

</body>
</html>
